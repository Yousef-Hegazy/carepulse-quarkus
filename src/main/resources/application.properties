quarkus.oidc.auth-server-url=https://keycloak.appwrite-yousef.top/realms/CarePulse
quarkus.oidc.client-id=carepulse
quarkus.oidc.application-type=service

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.reactive.url=postgresql://core.appwrite-yousef.top:5432/carepulse

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:9000
quarkus.http.cors.methods=GET,POST,PUT,DELETE
quarkus.http.cors.headers=Authorization,Content-Type
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.log.highlight-sql=true
quarkus.hibernate-orm.database.default-schema=public
quarkus.hibernate-orm.schema-management.strategy=none